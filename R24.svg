<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">

  <style>
    /* ── Background ── */
    .bg { fill: #0A0A0F; }

    /* ── Track layers ── */
    .track-glow  { fill: none; stroke: #9B5CFF; stroke-width: 14; stroke-opacity: 0.10; stroke-linecap: round; stroke-linejoin: round; }
    .track-edge  { fill: none; stroke: #9B5CFF; stroke-width: 1.5; stroke-opacity: 0.28; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Animated racing line ── */
    .racing-line {
      fill: none;
      stroke: #9B5CFF;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 1600;
      stroke-dashoffset: 1600;
      filter: url(#glow-purple);
      animation: drawTrack 5s linear infinite;
    }

    @keyframes drawTrack {
      0%   { stroke-dashoffset: 1600; }
      100% { stroke-dashoffset: 0; }
    }

    /* ── Car dot ── */
    .car-outer {
      fill: #9B5CFF;
      filter: url(#glow-purple);
      animation: moveCar 5s linear infinite, pulse .6s ease-in-out infinite;
      offset-path: path("M 120 195 L 320 195 Q 355 195 368 210 L 385 240 Q 398 268 382 285 L 355 298 Q 330 308 308 295 L 290 278 Q 272 258 248 258 L 192 258 Q 168 258 155 272 L 148 282 Q 138 298 148 312 L 162 325 Q 178 338 200 338 L 310 338 Q 338 338 355 322 L 430 248 Q 448 230 448 205 L 448 178 Q 448 155 465 145 L 488 138 Q 510 132 522 148 L 528 165 Q 532 182 520 192 L 500 200 Q 482 206 475 222 L 468 240 Q 460 260 440 268 L 415 274 Q 392 278 378 295 L 365 315 Q 350 338 325 345 L 200 345 Q 168 345 148 328 L 128 308 Q 108 288 108 258 L 108 222 Q 108 205 120 198 Z");
      offset-distance: 0%;
    }
    .car-inner {
      fill: #ffffff;
      filter: url(#glow-white);
      animation: moveCar 5s linear infinite;
      offset-path: path("M 120 195 L 320 195 Q 355 195 368 210 L 385 240 Q 398 268 382 285 L 355 298 Q 330 308 308 295 L 290 278 Q 272 258 248 258 L 192 258 Q 168 258 155 272 L 148 282 Q 138 298 148 312 L 162 325 Q 178 338 200 338 L 310 338 Q 338 338 355 322 L 430 248 Q 448 230 448 205 L 448 178 Q 448 155 465 145 L 488 138 Q 510 132 522 148 L 528 165 Q 532 182 520 192 L 500 200 Q 482 206 475 222 L 468 240 Q 460 260 440 268 L 415 274 Q 392 278 378 295 L 365 315 Q 350 338 325 345 L 200 345 Q 168 345 148 328 L 128 308 Q 108 288 108 258 L 108 222 Q 108 205 120 198 Z");
      offset-distance: 0%;
    }

    @keyframes moveCar {
      0%   { offset-distance: 0%; }
      100% { offset-distance: 100%; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.65; }
    }

    /* ── DRS zones ── */
    .drs-line  { stroke: #00FF87; stroke-width: 1.5; stroke-dasharray: 5 3; stroke-opacity: 0.55; }
    .drs-label { font-size: 8px; fill: #00FF87; font-family: monospace; opacity: 0.65; }

    /* ── Labels ── */
    .corner-label  { font-size: 8px;  fill: #3a3a5a; font-family: monospace; }
    .section-label { font-size: 9px;  fill: #9B5CFF; font-family: monospace; opacity: 0.45; }
    .title-label   { font-size: 11px; fill: #2a2a3a; font-family: monospace; letter-spacing: 3px; }
    .sf-label      { font-size: 8px;  fill: #9B5CFF; font-family: monospace; opacity: 0.7; }
  </style>

  <defs>
    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-white" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" class="bg" rx="10"/>

  <!-- Atmosphere dots — twilight feel -->
  <circle cx="48"  cy="48"  r="1.5" fill="#9B5CFF" opacity="0.28"/>
  <circle cx="68"  cy="28"  r="1"   fill="#9B5CFF" opacity="0.18"/>
  <circle cx="555" cy="78"  r="1.5" fill="#9B5CFF" opacity="0.22"/>
  <circle cx="572" cy="55"  r="1"   fill="#9B5CFF" opacity="0.14"/>
  <circle cx="38"  cy="372" r="1"   fill="#9B5CFF" opacity="0.18"/>
  <circle cx="562" cy="362" r="1.5" fill="#9B5CFF" opacity="0.22"/>
  <circle cx="30"  cy="200" r="1"   fill="#9B5CFF" opacity="0.12"/>
  <circle cx="580" cy="200" r="1"   fill="#9B5CFF" opacity="0.12"/>

  <!-- Title -->
  <text x="300" y="28" class="title-label" text-anchor="middle">YAS MARINA</text>

  <!-- ── Track: glow layer ── -->
  <path class="track-glow"
    d="M 120 195
       L 320 195
       Q 355 195 368 210
       L 385 240
       Q 398 268 382 285
       L 355 298
       Q 330 308 308 295
       L 290 278
       Q 272 258 248 258
       L 192 258
       Q 168 258 155 272
       L 148 282
       Q 138 298 148 312
       L 162 325
       Q 178 338 200 338
       L 310 338
       Q 338 338 355 322
       L 430 248
       Q 448 230 448 205
       L 448 178
       Q 448 155 465 145
       L 488 138
       Q 510 132 522 148
       L 528 165
       Q 532 182 520 192
       L 500 200
       Q 482 206 475 222
       L 468 240
       Q 460 260 440 268
       L 415 274
       Q 392 278 378 295
       L 365 315
       Q 350 338 325 345
       L 200 345
       Q 168 345 148 328
       L 128 308
       Q 108 288 108 258
       L 108 222
       Q 108 205 120 198 Z"/>

  <!-- ── Track: edge outline ── -->
  <path class="track-edge"
    d="M 120 195
       L 320 195
       Q 355 195 368 210
       L 385 240
       Q 398 268 382 285
       L 355 298
       Q 330 308 308 295
       L 290 278
       Q 272 258 248 258
       L 192 258
       Q 168 258 155 272
       L 148 282
       Q 138 298 148 312
       L 162 325
       Q 178 338 200 338
       L 310 338
       Q 338 338 355 322
       L 430 248
       Q 448 230 448 205
       L 448 178
       Q 448 155 465 145
       L 488 138
       Q 510 132 522 148
       L 528 165
       Q 532 182 520 192
       L 500 200
       Q 482 206 475 222
       L 468 240
       Q 460 260 440 268
       L 415 274
       Q 392 278 378 295
       L 365 315
       Q 350 338 325 345
       L 200 345
       Q 168 345 148 328
       L 128 308
       Q 108 288 108 258
       L 108 222
       Q 108 205 120 198 Z"/>

  <!-- ── Animated racing line ── -->
  <path class="racing-line"
    d="M 120 195
       L 320 195
       Q 355 195 368 210
       L 385 240
       Q 398 268 382 285
       L 355 298
       Q 330 308 308 295
       L 290 278
       Q 272 258 248 258
       L 192 258
       Q 168 258 155 272
       L 148 282
       Q 138 298 148 312
       L 162 325
       Q 178 338 200 338
       L 310 338
       Q 338 338 355 322
       L 430 248
       Q 448 230 448 205
       L 448 178
       Q 448 155 465 145
       L 488 138
       Q 510 132 522 148
       L 528 165
       Q 532 182 520 192
       L 500 200
       Q 482 206 475 222
       L 468 240
       Q 460 260 440 268
       L 415 274
       Q 392 278 378 295
       L 365 315
       Q 350 338 325 345
       L 200 345
       Q 168 345 148 328
       L 128 308
       Q 108 288 108 258
       L 108 222
       Q 108 205 120 198 Z"/>

  <!-- ── Car dots (CSS offset-path animation) ── -->
  <circle class="car-outer" r="6"/>
  <circle class="car-inner" r="3"/>

  <!-- ── Start / Finish line ── -->
  <rect x="117" y="183" width="3" height="24" fill="white" opacity="0.45" rx="1"/>
  <text x="114" y="177" class="sf-label" text-anchor="middle">S/F</text>

  <!-- ── DRS Zone 1 — main straight ── -->
  <line x1="122" y1="205" x2="290" y2="205" class="drs-line"/>
  <text x="205" y="215" class="drs-label" text-anchor="middle">DRS 1</text>

  <!-- ── DRS Zone 2 — back straight / hotel ── -->
  <line x1="448" y1="165" x2="448" y2="208" class="drs-line"/>
  <text x="458" y="190" class="drs-label">DRS 2</text>

  <!-- ── Corner labels ── -->
  <text x="338" y="187" class="corner-label">T1</text>
  <text x="392" y="255" class="corner-label">T2</text>
  <text x="358" y="300" class="corner-label">T3</text>
  <text x="270" y="252" class="corner-label">T5</text>
  <text x="152" y="268" class="corner-label">T7</text>
  <text x="102" y="300" class="corner-label">T8</text>
  <text x="162" y="340" class="corner-label">T9</text>
  <text x="358" y="320" class="corner-label">T13</text>
  <text x="440" y="245" class="corner-label">T14</text>
  <text x="452" y="148" class="corner-label">T11</text>
  <text x="524" y="150" class="corner-label">T12</text>
  <text x="526" y="200" class="corner-label">T13</text>
  <text x="470" y="272" class="corner-label">T16</text>
  <text x="340" y="355" class="corner-label">T17</text>

  <!-- ── Hotel section label ── -->
  <text x="492" y="168" class="section-label">HOTEL</text>
  <text x="492" y="180" class="section-label">SECTION</text>

  <!-- ── Legend ── -->
  <line x1="30" y1="385" x2="52" y2="385" stroke="#9B5CFF" stroke-width="2.5" stroke-opacity="0.8"/>
  <text x="56" y="388" font-size="8" fill="#3a3a5a" font-family="monospace">Racing line</text>
  <line x1="120" y1="385" x2="142" y2="385" stroke="#00FF87" stroke-width="1.5" stroke-dasharray="4 3" stroke-opacity="0.6"/>
  <text x="146" y="388" font-size="8" fill="#3a3a5a" font-family="monospace">DRS zone</text>
  <circle cx="220" cy="385" r="4" fill="#9B5CFF" opacity="0.8"/>
  <text x="228" y="388" font-size="8" fill="#3a3a5a" font-family="monospace">Car</text>

</svg>
