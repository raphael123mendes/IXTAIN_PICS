<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IXTAIN PICS</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #242424;
      --accent: #e8ff47;
      --text: #efefef;
      --muted: #555;
    }
 
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
 
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }
 
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
 
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 0.15em;
      color: var(--accent);
    }
 
    .tag {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.3rem 0.8rem;
    }
 
    .viewer-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      gap: 1.5rem;
      animation: fadeIn 0.5s ease both;
    }
 
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    .file-label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }
 
    .svg-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2rem;
      max-width: 900px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: border-color 0.2s;
      min-height: 200px;
    }
 
    .svg-box:hover { border-color: var(--accent); }
 
    .svg-box img {
      max-width: 100%;
      height: auto;
      display: block;
    }
 
    .svg-box::before, .svg-box::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      border-color: var(--accent);
      border-style: solid;
    }
    .svg-box::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .svg-box::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
 
    .error-msg {
      display: none;
      font-size: 0.7rem;
      color: #ff5555;
      letter-spacing: 0.1em;
      text-align: center;
      padding: 1rem 0;
    }
 
    .nav-controls {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
 
    .nav-controls button, .controls button {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.5rem 1.2rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .nav-controls button:hover:not(:disabled),
    .controls button:hover {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }
    .nav-controls button:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }
 
    .pic-counter {
      font-size: 0.7rem;
      color: var(--muted);
      min-width: 5rem;
      text-align: center;
      letter-spacing: 0.1em;
    }
 
    .controls { display: flex; gap: 0.5rem; }
 
    /* Gallery index */
    .gallery-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 3rem 2rem;
      animation: fadeIn 0.5s ease both;
    }
 
    .gallery-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 0.15em;
      color: var(--accent);
    }
 
    .gallery-subtitle {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
 
    .gallery-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      max-width: 640px;
    }
 
    .gallery-grid a {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      padding: 0.45rem 0.85rem;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .gallery-grid a:hover {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }
 
    footer {
      padding: 1rem 2rem;
      border-top: 1px solid var(--border);
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
 
  <header>
    <div class="logo">IXTAIN PICS</div>
    <div class="tag" id="headerTag">SVG Viewer</div>
  </header>
 
  <!-- Viewer -->
  <div class="viewer-wrap" id="viewerWrap" style="display:none;">
    <div class="file-label" id="fileLabel"></div>
    <div class="svg-box" id="svgBox">
      <img id="svgImg" src="" alt="SVG" onerror="handleError()" />
      <p class="error-msg" id="errorMsg">⚠ File not found — make sure this SVG exists in your repo.</p>
    </div>
    <div class="nav-controls">
      <button id="btnPrev" onclick="navigate(-1)">← Prev</button>
      <span class="pic-counter" id="picCounter"></span>
      <button id="btnNext" onclick="navigate(1)">Next →</button>
    </div>
    <div class="controls">
      <button onclick="openFullscreen()">Fullscreen</button>
      <button onclick="downloadSVG()">Download</button>
    </div>
  </div>
 
  <!-- Gallery index (shown when no ?pic= param) -->
  <div class="gallery-wrap" id="galleryWrap">
    <div class="gallery-title">All Pictures</div>
    <div class="gallery-subtitle">Click any to open</div>
    <div class="gallery-grid" id="galleryGrid"></div>
  </div>
 
  <footer>
    <span>github.com/raphael123mendes/IXTAIN_PICS</span>
    <span id="footerFile">SVG · Vector</span>
  </footer>
 
  <script>
    // ── Config ────────────────────────────────────────
    const TOTAL  = 24;   // Total number of SVGs (R1 to R24)
    const PREFIX = 'R';  // Filename prefix — change if yours is different
    // ─────────────────────────────────────────────────
 
    let currentNum = 0;
 
    function init() {
      const params = new URLSearchParams(window.location.search);
      const picParam = params.get('pic');
 
      if (picParam) {
        // Strip any non-digit chars and parse number
        const n = parseInt(picParam.replace(/\D/g, ''));
        if (n >= 1 && n <= TOTAL) {
          showViewer(n);
          return;
        }
      }
 
      // No valid param — show gallery index
      showGallery();
    }
 
    function showViewer(n) {
      document.getElementById('viewerWrap').style.display = 'flex';
      document.getElementById('galleryWrap').style.display = 'none';
      loadPic(n);
    }
 
    function showGallery() {
      document.getElementById('viewerWrap').style.display = 'none';
      document.getElementById('galleryWrap').style.display = 'flex';
      document.getElementById('headerTag').textContent = `1 – ${TOTAL} pics`;
      document.title = 'IXTAIN PICS — Gallery';
 
      const grid = document.getElementById('galleryGrid');
      grid.innerHTML = '';
      for (let i = 1; i <= TOTAL; i++) {
        const a = document.createElement('a');
        a.href  = `?pic=${PREFIX}${i}`;
        a.textContent = `${PREFIX}${i}`;
        grid.appendChild(a);
      }
    }
 
    function loadPic(n) {
      currentNum = n;
      const filename = `${PREFIX}${n}.svg`;
 
      // Reset
      document.getElementById('errorMsg').style.display = 'none';
      document.getElementById('svgBox').style.borderColor = '';
      document.getElementById('svgImg').style.display = 'block';
 
      document.getElementById('svgImg').src     = filename;
      document.getElementById('fileLabel').textContent  = filename;
      document.getElementById('headerTag').textContent  = `${PREFIX}${n} of ${TOTAL}`;
      document.getElementById('picCounter').textContent = `${n} of ${TOTAL}`;
      document.getElementById('footerFile').textContent = `SVG · ${filename}`;
      document.title = `IXTAIN PICS — ${filename}`;
 
      document.getElementById('btnPrev').disabled = n <= 1;
      document.getElementById('btnNext').disabled = n >= TOTAL;
 
      // Update URL without page reload
      const url = new URL(window.location);
      url.searchParams.set('pic', `${PREFIX}${n}`);
      window.history.replaceState({}, '', url);
    }
 
    function navigate(dir) {
      const next = currentNum + dir;
      if (next >= 1 && next <= TOTAL) loadPic(next);
    }
 
    function handleError() {
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('svgBox').style.borderColor = '#ff5555';
      document.getElementById('svgImg').style.display = 'none';
    }
 
    function openFullscreen() {
      const img = document.getElementById('svgImg');
      if (img.requestFullscreen) img.requestFullscreen();
      else window.open(img.src, '_blank');
    }
 
    function downloadSVG() {
      const a = document.createElement('a');
      a.href     = document.getElementById('svgImg').src;
      a.download = `${PREFIX}${currentNum}.svg`;
      a.click();
    }
 
    // Keyboard arrow navigation
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
    });
 
    init();
  </script>
 
</body>
</html>
